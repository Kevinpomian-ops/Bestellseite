<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerHouse</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header>
        <img src="./assets/icon/Logo 02.png" alt="Logo">
        <nav>
            <img src="./assets/icon/menu.png" alt="Cart">
        </nav>
    </header>



    <div class="landing-container">
        <img src="./assets/img/hero.png" alt="Hero Image">
        <div class="landing">
            <img src="./assets/img/Logo.png" alt="Arrow">
        </div>
        <div class="landing-text">
            <h1><span style="color: #E76C1F;">Burger</span><span>House</span></h1>
            <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </div>
    </div>

    <main>
        <div>
            <section class="menu-column">
                <div class="category-burger flex content-grid">
                    <img src="./assets/icon/Chanese 1.png" alt="Burger">
                    <h3>Burger & Sandwiches</h3>
                </div>
                <div id="burger"></div>
                <div class="category-pizza flex content-grid">
                    <img src="./assets/icon/Pizza 1.png" alt="Pizza">
                    <h3>Pizza (30cm)</h3>
                </div>
                <div id="pizza"></div>
                <div class="category-salads flex content-grid">
                    <img src="./assets/icon/Salad 1.png" alt="Salads">
                    <h3>Salads</h3>
                </div>
                <div id="salads"></div>
            </section>

            <section class="basket">
                <h3>Your Basket</h3>
                <div class="basket-list" id="basket"></div>
                <div class="basket-summary" id="basketSummary"></div>
                <button id="checkoutButton" onclick="openCheckout()">Buy now</button>
            </section>


            <div id="checkoutModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Deine Bestellung</h2>

                    <div id="checkoutItems"></div>

                    <p id="checkoutTotal"></p>

                    <p>Willst du diese Bestellung aufgeben?</p>

                    <button onclick="confirmOrder()">Ja, bestellen</button>
                    <button onclick="closeModal()">schließen</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 BurgerHouse</p>
        <a href="./impressum.html">Impressum</a>
        <a href="#">Cookie Preferences</a>
    </footer>


    <nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
        <button class="nav-btn" id="navHome"><img src="./assets/icon/home.svg" alt="Home"></button>
        <button class="nav-btn" id="navProfile"><img src="./assets/icon/profile.svg" alt="Profile"></button>
        <button class="nav-btn" id="navSearch"><img src="./assets/icon/dinner.svg" alt="Diner"></button>
        <button class="nav-btn" id="navBasket"><img src="./assets/icon/basket.svg" alt="Basket"></button>
    </nav>
</body>
<script src="./scripts/menu.js"></script>
<script src="./scripts/template.js"></script>
<script src="./scripts/basket.js"></script>

</html>
