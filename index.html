<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerHouse</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header>
        <img src="./assets/icon/Logo 02.png" alt="Logo">
        <nav>
            <img src="./assets/icon/menu.png" alt="Cart">
        </nav>
    </header>

    <div class="landing-container">
        <img src="./assets/img/hero.png" alt="Hero Image">
        <div class="landing">
            <img src="./assets/img/Logo.png" alt="Arrow">
        </div>
        <div class="landing-text">
            <h1><span style="color: #E76C1F;">Burger</span><span>House</span></h1>
            <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </div>
    </div>

    <main>
        <div>
            <div class="category-burger flex">
                <img src="./assets/icon/Chanese 1.png" alt="Burger">
                <h3>Burger & Sandwiches</h3>
            </div>
            <div id="burger"></div>
            <div class="category-pizza flex">
                <img src="./assets/icon/Pizza 1.png" alt="Pizza">
                <h3>Pizza (30cm)</h3>
            </div>
            <div id="pizza"></div>
            <div class="category-salads flex">
                <img src="./assets/icon/Salad 1.png" alt="Salads">
                <h3>Salads</h3>
            </div>
            <div id="salads"></div>

            <section class="basket">
                <h3>Your Basket</h3>
                <div>

                </div>

                <div>

                </div>

                <button>Buy Now</button>
            </section>
        </div>

    </main>

    <footer>
        <p>&copy; 2023 BurgerHouse</p>
        <a href="#">Imprint</a>
        <a href="#">Cookie Preferences</a>
    </footer>
</body>
<script src="./scripts/menu.js"></script>
<script src="./scripts/template.js"></script>
<script src="./scripts/script.js"></script>

</html>
